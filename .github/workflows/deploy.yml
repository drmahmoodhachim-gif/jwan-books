name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm install
      - run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyCtMkmwxC4YNqpNja0z40Y1eFPIIRz48T4
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: realtime-fe14f.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_DATABASE_URL: https://realtime-fe14f-default-rtdb.firebaseio.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: realtime-fe14f
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: realtime-fe14f.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "643773236111"
          NEXT_PUBLIC_FIREBASE_APP_ID: 1:643773236111:web:a85ee147f0a8f3707a01fa

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
